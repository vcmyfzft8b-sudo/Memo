<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your Memo verification code</title>
  </head>
  <body style="margin:0;padding:0;background:#f3ede2;color:#1f1300;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
    <div style="max-width:560px;margin:0 auto;padding:40px 20px;">
      <div style="background:#fffdfa;border:1px solid #eadcc3;border-radius:32px;padding:36px 32px;text-align:center;box-shadow:0 28px 80px rgba(31,19,0,0.08);">
        <img src="https://notetakingappslo.vercel.app/memo-logo.png" alt="Memo" width="72" height="72" style="display:block;width:72px;height:72px;margin:0 auto 16px;border-radius:22px;object-fit:cover;" />
        <p style="margin:0;font-size:18px;font-weight:800;color:#1f1300;">Memo</p>
        <p style="margin:6px 0 0;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#a57c43;">Lecture notes and study chat</p>
        <h1 style="margin:28px 0 10px;font-size:34px;line-height:1.05;color:#1f1300;">
          Use this code
        </h1>
        <p style="margin:0 0 24px;font-size:16px;line-height:1.5;color:#5f4928;">
          Enter it in the app.
        </p>
        <div style="margin:0 0 22px;padding:22px 18px;border-radius:24px;background:linear-gradient(180deg,#fbf4e8,#f2e2c2);border:1px solid #e6d2ae;text-align:center;">
          <span style="font-size:38px;line-height:1;font-weight:800;letter-spacing:0.42em;color:#1f1300;">
            {{ .Token }}
          </span>
        </div>
        <p style="margin:0;font-size:13px;line-height:1.55;color:#7b6540;">
          If you didn&apos;t request this, you can ignore this email.
        </p>
      </div>
    </div>
  </body>
</html>
